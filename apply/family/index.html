<!doctype html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<meta content="QR 스티커 하나로 시작하는 두레 가족가게 참여 절차와 신청 방법을 확인하세요." name="description"/>
<title>두레 | 가족가게 신청</title>
<style>
    :root {
      --ink: #191a1c;
      --muted: #6d7278;
      --brand: #3d8f38;
      --brand-deep: #2b6c29;
      --paper: #fbfbf8;
      --line: rgba(18, 28, 18, .08);
      --shadow: 0 18px 50px rgba(33, 55, 33, .09);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        radial-gradient(900px 500px at 50% -220px, rgba(105, 162, 91, .10), transparent 72%),
        var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    a { color: inherit; text-decoration: none; }
    .topbar {
      position: sticky;
      z-index: 10;
      top: 0;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(251, 251, 248, .84);
      border-bottom: 1px solid rgba(18, 28, 18, .06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .brand {
      display: inline-flex;
      gap: 9px;
      align-items: center;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.045em;
    }
    .brand-mark {
      position: relative;
      width: 22px;
      height: 22px;
      border: 2px solid var(--ink);
      border-radius: 50%;
    }
    .brand-mark::before {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      left: -4px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--brand);
      border-radius: 50%;
      box-shadow: 0 0 0 2px var(--paper);
    }
    .brand-text small {
      margin-left: 6px;
      color: var(--muted);
      font-weight: 650;
      letter-spacing: -0.035em;
    }
    .top-cta, .primary-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      color: #fff;
      background: linear-gradient(135deg, #4c9a43, #317d2c);
      font-weight: 800;
      letter-spacing: -0.035em;
      box-shadow: 0 10px 24px rgba(54, 125, 46, .24);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .top-cta { border-radius: 10px; padding: 11px 15px; font-size: 14px; }
    .primary-cta { border-radius: 14px; min-height: 58px; padding: 16px 24px; font-size: 17px; width: min(100%, 410px); }
    .top-cta:hover, .primary-cta:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(54, 125, 46, .31); }

    .container { width: min(100% - 40px, 760px); margin: 0 auto; }
    .hero { padding: 86px 0 56px; text-align: center; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 17px;
      color: var(--brand-deep);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 0 5px rgba(61, 143, 56, .10);
    }
    h1 {
      margin: 0;
      font-size: clamp(38px, 7vw, 60px);
      line-height: 1.12;
      letter-spacing: -0.07em;
      font-weight: 850;
    }
    .hero p {
      max-width: 430px;
      margin: 19px auto 0;
      color: var(--muted);
      font-size: clamp(17px, 2.8vw, 20px);
      line-height: 1.65;
      letter-spacing: -0.045em;
    }
    .intro-line {
      width: 42px;
      height: 2px;
      margin: 29px auto 0;
      background: #92b88d;
      border-radius: 99px;
    }
    .steps { display: grid; gap: 28px; padding-bottom: 32px; }
    .step-card {
      margin: 0;
      overflow: hidden;
      background: #fff;
      border: 1px solid rgba(23, 44, 26, .055);
      border-radius: 26px;
      box-shadow: var(--shadow);
    }
    .step-card img { display: block; width: 100%; height: auto; }
    .support {
      margin: 8px auto 34px;
      padding: clamp(28px, 6vw, 46px);
      border-radius: 28px;
      text-align: center;
      color: #fff;
      background: linear-gradient(135deg, #347d31, #4a9a42);
      box-shadow: 0 20px 50px rgba(59, 129, 51, .22);
    }
    .support .badge {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      margin-bottom: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,.16);
      font-size: 21px;
    }
    .support h2 {
      margin: 0;
      font-size: clamp(25px, 5vw, 34px);
      letter-spacing: -0.06em;
      line-height: 1.26;
    }
    .support p {
      max-width: 540px;
      margin: 17px auto 0;
      color: rgba(255,255,255,.88);
      font-size: 17px;
      letter-spacing: -0.04em;
      line-height: 1.7;
    }
    .cta {
      margin: 0 auto 90px;
      padding: clamp(32px, 6vw, 54px) clamp(22px, 5vw, 46px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 16px 42px rgba(22, 37, 22, .07);
    }
    .cta .kicker {
      margin: 0 0 13px;
      color: var(--brand-deep);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .cta h2 {
      margin: 0;
      font-size: clamp(30px, 5.8vw, 43px);
      line-height: 1.23;
      letter-spacing: -0.068em;
    }
    .cta .desc {
      margin: 15px auto 7px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
      letter-spacing: -0.04em;
    }
    .benefits {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 20px auto 27px;
    }
    .benefits span {
      padding: 8px 11px;
      border-radius: 99px;
      color: #3d5f3b;
      background: #f0f6ee;
      font-size: 13px;
      font-weight: 750;
      letter-spacing: -0.035em;
    }
    footer {
      padding: 0 20px 37px;
      color: #92969b;
      text-align: center;
      font-size: 13px;
      letter-spacing: -0.02em;
    }
    .reveal { opacity: 0; transform: translateY(18px); animation: rise .55s cubic-bezier(.2,.75,.25,1) forwards; }
    .step-card:nth-child(1) { animation-delay: .04s; }
    .step-card:nth-child(2) { animation-delay: .08s; }
    .step-card:nth-child(3) { animation-delay: .12s; }
    .step-card:nth-child(4) { animation-delay: .16s; }
    .step-card:nth-child(5) { animation-delay: .20s; }
    .step-card:nth-child(6) { animation-delay: .24s; }
    .step-card:nth-child(7) { animation-delay: .28s; }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 520px) {
      .topbar { height: 60px; padding: 0 16px; }
      .brand { font-size: 16px; }
      .brand-text small { display: none; }
      .top-cta { padding: 10px 12px; font-size: 13px; }
      .container { width: min(100% - 24px, 760px); }
      .hero { padding: 58px 0 37px; }
      .steps { gap: 17px; }
      .step-card { border-radius: 18px; }
      .support { border-radius: 20px; margin-bottom: 22px; }
      .cta { border-radius: 20px; margin-bottom: 58px; }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation: none !important; transition: none !important; }
      .reveal { opacity: 1; transform: none; }
    }
  </style>
