<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>페이지를 찾을 수 없습니다 | 두레</title>
  <link rel="icon" href="/assets/logo/favicon.svg" type="image/svg+xml">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#fbfcf8;color:#111713;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;text-align:center}.box{max-width:620px;padding:54px 34px;border:1px solid #e6eadf;border-radius:28px;background:#fff;box-shadow:0 22px 70px rgba(45,72,17,.09)}.mark{display:inline-block;width:42px;height:42px;border:5px solid #111713;border-left-color:transparent;border-radius:50%;transform:rotate(-42deg);position:relative}.mark:after{content:"";position:absolute;width:11px;height:11px;left:-8px;bottom:2px;border-radius:50%;background:#79b90f}h1{margin:24px 0 12px;font-size:clamp(30px,6vw,48px);letter-spacing:-.06em}p{margin:0;color:#62675d;line-height:1.7}a{display:inline-flex;margin-top:28px;min-height:48px;padding:0 22px;align-items:center;justify-content:center;border-radius:999px;background:#4c9000;color:#fff;text-decoration:none;font-weight:800}
  </style>
</head>
<body><main class="box"><span class="mark" aria-hidden="true"></span><h1>페이지를 찾을 수 없어요.</h1><p>주소가 변경되었거나 존재하지 않는 페이지입니다.<br>두레 메인 페이지에서 다시 확인해 주세요.</p><a href="/">두레 홈으로 이동</a></main></body></html>
